<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boak - Librería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Enlace a tu CSS externo -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-custom shadow-sm">
    <div class="container-fluid px-lg-5"> <div class="row w-100 align-items-center g-0">
            
            <div class="col-auto d-flex align-items-center">
                <a class="navbar-brand me-4" href="#">BOAK-MEMBRILLO</a>
                <button class="btn-categories d-none d-lg-flex" type="button">
                    <i class="bi bi-list fs-3"></i>
                    Categorías
                </button>
            </div>

            <div class="col px-md-4">
                <div class="search-group">
                    <i class="bi bi-search"></i>
                    <input type="text" class="form-control" placeholder="Buscar...">
                </div>
            </div>

            <div class="col-auto d-flex align-items-center gap-4">
                <a href="#" class="nav-link-custom d-none d-sm-flex">
                    <i class="bi bi-person-circle"></i>
                    <span>Iniciar sesión</span>
                </a>
                
                <a href="#" class="nav-link-custom position-relative">
                    <i class="bi bi-bag"></i>
                    <span class="position-absolute top-0 start-50 translate-middle badge rounded-pill bg-dark cart-badge">
                        0
                    </span>
                </a>
            </div>

        </div>
    </div>
</nav>

<main class="container-fluid px-lg-5 mt-4">

    <!-- SECCIÓN LIBROS -->
    <section class="section-container">
        <h2 class="section-title">Los 10 libros más vendidos</h2>
        <div id="contenedor-libros" class="carousel-netflix">
            <!-- JS cargará los datos aquí -->
        </div>
    </section>

    <!-- SECCIÓN MÚSICA -->
    <section class="section-container">
        <h2 class="section-title">Los 10 álbumes de música más vendidos</h2>
        <div id="contenedor-musica" class="carousel-netflix">
            <!-- JS cargará los datos aquí -->
        </div>
    </section>

    <!-- SECCIÓN OBJETOS -->
    <section class="section-container mb-5">
        <h2 class="section-title">Los 10 objetos más vendidos</h2>
        <div id="contenedor-objetos" class="carousel-netflix">
            <!-- JS cargará los datos aquí -->
        </div>
    </section>
</main>

<!-- Enlazamos tu ViewModel -->
<script src="../viewModel/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
